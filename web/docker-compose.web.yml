# AmneziaWG Web Interface Docker Compose Configuration

services:
  # Backend API
  amneziawg-web-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: amneziawg-web-api
    restart: unless-stopped
    environment:
      # Load from .env.web file
      - SERVER_ADDRESS=${SERVER_ADDRESS:-:8080}
      - SERVER_ENVIRONMENT=${SERVER_ENVIRONMENT:-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TTL=${JWT_ACCESS_TTL:-15m}
      - JWT_REFRESH_TTL=${JWT_REFRESH_TTL:-24h}
      - DATABASE_URL=${DATABASE_URL:-file:./data/amneziawg.db?cache=shared&mode=rwc}
      - VPN_CONTAINER_NAME=${VPN_CONTAINER_NAME:-amneziawg-server}
      - VPN_PROJECT_PATH=${VPN_PROJECT_PATH:-/app/amnezia-wg-docker}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:80,http://localhost}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - CONNECTION_DEFAULT_TTL=${CONNECTION_DEFAULT_TTL:-720h}
      - API_ENDPOINT_HOST=${API_ENDPOINT_HOST:-localhost:8080}
      - API_ENDPOINT_PROTOCOL=${API_ENDPOINT_PROTOCOL:-http}
    # Direct file mapping instead of volumes
    volumes:
      # VPN Server integration - direct access to VPN server files
      - ../config:/app/amnezia-wg-docker/config:ro
      - ../clients:/app/amnezia-wg-docker/clients:ro
      - ../scripts:/app/amnezia-wg-docker/scripts:ro
      - ../.env:/app/amnezia-wg-docker/.env:ro
      # Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Database storage
      - ./backend/data:/app/data
    ports:
      - "8080:8080"
    networks:
      - amneziawg-web
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - amneziawg-web-db-init

  # Database initialization
  amneziawg-web-db-init:
    image: alpine:3.18
    container_name: amneziawg-web-db-init
    command: |
      sh -c '
        mkdir -p /app/data
        chmod 755 /app/data
        echo "Database directory initialized"
      '
    volumes:
      - ./backend/data:/app/data
    networks:
      - amneziawg-web

  # Frontend (React App)
  amneziawg-web-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: amneziawg-web-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost/api/v1}
      - VITE_WS_BASE_URL=${VITE_WS_BASE_URL:-ws://localhost/ws}
      - VITE_APP_NAME=${VITE_APP_NAME:-AmneziaWG Web Interface}
      - VITE_CONNECTION_PREFIX=${VITE_CONNECTION_PREFIX:-awgwc://}
    ports:
      - "80:80"
    networks:
      - amneziawg-web
    env_file:
      - ./frontend/.env
    depends_on:
      - amneziawg-web-api



networks:
  amneziawg-web:
    name: amneziawg-web
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
  
  # Connect to VPN server network if needed
  default:
    external: true
    name: amnezia-wg-docker_default
