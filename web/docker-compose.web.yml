# AmneziaWG Web Interface Docker Compose Configuration
version: '3.8'

services:
  # Backend API
  amneziawg-web-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: amneziawg-web-api
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - SERVER_ADDRESS=:8080
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:80,http://localhost
      - AWG_CONFIG_PATH=/app/config
      - AWG_CLIENTS_PATH=/app/clients
      - AWG_SCRIPTS_PATH=/app/scripts
      - AWG_SERVICE_NAME=amneziawg-server
    volumes:
      # Монтируем конфигурацию AmneziaWG
      - ../config:/app/config:ro
      - ../clients:/app/clients:ro
      - ../scripts:/app/scripts:ro
      # Доступ к Docker socket для управления контейнерами
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Доступ к проекту для make команд
      - ..:/home/blacksazha/amnezia-wg-docker:ro
    ports:
      - "8080:8080"
    networks:
      - amneziawg-web
    depends_on:
      - amneziawg-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (React App)
  amneziawg-web-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: amneziawg-web-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "3000:80"
    networks:
      - amneziawg-web
    depends_on:
      - amneziawg-web-api

  # Nginx Reverse Proxy
  amneziawg-web-nginx:
    image: nginx:alpine
    container_name: amneziawg-web-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - amneziawg-web
    depends_on:
      - amneziawg-web-frontend
      - amneziawg-web-api

  # AmneziaWG Server (ссылка на основной сервис)
  amneziawg-server:
    extends:
      file: ../docker-compose.yml
      service: amneziawg
    networks:
      - amneziawg-web
      - amneziawg-net

networks:
  amneziawg-web:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
  
  # Используем существующую сеть AmneziaWG
  amneziawg-net:
    external: true

volumes:
  amneziawg-web-data:
